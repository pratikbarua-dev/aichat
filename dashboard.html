<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lust Chat | Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Nunito', sans-serif; background-color: #050505; color: #e5e7eb; }
        .glass { background: rgba(18, 18, 18, 0.8); backdrop-filter: blur(12px); border-right: 1px solid rgba(255, 255, 255, 0.05); }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .chat-bubble-user { background: linear-gradient(135deg, #e11d48, #881337); }
        .chat-bubble-ai { background: #1e1e1e; border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body class="h-screen flex overflow-hidden">

    <!-- Sidebar -->
    <aside class="w-80 flex-shrink-0 glass flex flex-col h-full border-r border-white/5">
        <div class="p-6 border-b border-white/5 flex items-center justify-between">
            <h1 class="text-xl font-bold text-rose-500">Lust Admin</h1>
            <button id="refresh-btn" class="p-2 hover:bg-white/5 rounded-full transition-colors" title="Refresh List">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>
            </button>
        </div>
        <div id="user-list" class="flex-1 overflow-y-auto p-2 space-y-1 scrollbar-hide">
            <div class="p-4 text-center text-gray-500 text-sm">Loading users...</div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-full bg-[#0a0a0a] relative">
        <!-- Header -->
        <header id="chat-header" class="h-16 flex-shrink-0 border-b border-white/5 flex items-center px-6 justify-between hidden">
            <div class="flex items-center gap-3">
                <div id="active-avatar" class="w-10 h-10 rounded-full bg-rose-600 flex items-center justify-center font-bold text-white uppercase">?</div>
                <div>
                    <h2 id="active-username" class="font-bold text-white text-lg leading-none">Select a user</h2>
                    <p id="active-roomid" class="text-xs text-gray-500 mt-1 uppercase tracking-wider"></p>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <span id="msg-count" class="text-xs bg-white/5 px-2 py-1 rounded text-gray-400">0 messages</span>
            </div>
        </header>

        <!-- Empty State -->
        <div id="empty-state" class="absolute inset-0 flex flex-col items-center justify-center text-center p-6">
            <div class="w-20 h-20 rounded-full bg-white/5 flex items-center justify-center mb-4">
                <svg class="w-10 h-10 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>
            </div>
            <h3 class="text-xl font-bold text-white mb-2">No Conversation Selected</h3>
            <p class="text-gray-500 max-w-sm">Select a person from the sidebar to view their full chat history and AI interactions.</p>
        </div>

        <!-- Chat History -->
        <div id="chat-history" class="flex-1 overflow-y-auto p-6 space-y-6 hidden">
            <!-- Messages load here -->
        </div>
    </main>

    <script>
        // HARDCODED CREDENTIALS
        const SUPABASE_URL = 'https://ogffcnwsokpxxrngpkrp.supabase.co';
        // Split key to avoid GitHub Push Protection
        const part1 = 'sb_secret_NCZc8bM1lBjvJwrLjXKcWQ';
        const part2 = '_P0oeFS73';
        const SUPABASE_KEY = part1 + part2;
        const SupabaseFactory = window.supabase;
        const supabase = SupabaseFactory.createClient(SUPABASE_URL, SUPABASE_KEY);

        const userListEl = document.getElementById('user-list');
        const chatHistoryEl = document.getElementById('chat-history');
        const emptyStateEl = document.getElementById('empty-state');
        const chatHeaderEl = document.getElementById('chat-header');
        const activeUsernameEl = document.getElementById('active-username');
        const activeRoomIdEl = document.getElementById('active-roomid');
        const activeAvatarEl = document.getElementById('active-avatar');
        const msgCountEl = document.getElementById('msg-count');
        const refreshBtn = document.getElementById('refresh-btn');

        let users = [];

        async function fetchUsers() {
            userListEl.innerHTML = '<div class="p-4 text-center text-gray-500 text-sm animate-pulse">Scanning database...</div>';
            
            // Fetch unique room_id and nicknames, ordered by latest message
            const { data, error } = await supabase
                .from('chat_messages')
                .select('room_id, nickname, created_at')
                .order('created_at', { ascending: false });

            if (error) {
                userListEl.innerHTML = `<div class="p-4 text-rose-500 text-sm">Error: ${error.message}</div>`;
                return;
            }

            // Process data to get unique "Conversations" (Group by Room ID)
            const conversations = {};
            data.forEach(msg => {
                if (!conversations[msg.room_id]) {
                    conversations[msg.room_id] = {
                        roomId: msg.room_id,
                        lastMsgTime: msg.created_at,
                        nicknames: new Set()
                    };
                }
                if (msg.nickname !== 'AI_BOT') {
                    conversations[msg.room_id].nicknames.add(msg.nickname);
                }
            });

            const sortedConvos = Object.values(conversations).sort((a, b) => 
                new Date(b.lastMsgTime) - new Date(a.lastMsgTime)
            );

            renderUserList(sortedConvos);
        }

        function renderUserList(convos) {
            userListEl.innerHTML = '';
            if (convos.length === 0) {
                userListEl.innerHTML = '<div class="p-4 text-center text-gray-500 text-sm">No messages found.</div>';
                return;
            }

            convos.forEach(convo => {
                const names = Array.from(convo.nicknames).join(', ') || 'Anonymous';
                const div = document.createElement('div');
                div.className = "p-4 rounded-xl cursor-pointer hover:bg-white/5 transition-all duration-200 group border border-transparent hover:border-white/10";
                div.onclick = () => loadChat(convo.roomId, names);
                
                const time = new Date(convo.lastMsgTime).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                const date = new Date(convo.lastMsgTime).toLocaleDateString([], { month: 'short', day: 'numeric' });

                div.innerHTML = `
                    <div class="flex justify-between items-start mb-1">
                        <span class="font-bold text-white group-hover:text-rose-400 transition-colors truncate pr-2">${names}</span>
                        <span class="text-[10px] text-gray-600 uppercase font-bold">${time}</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-xs text-gray-500 font-mono">${convo.roomId.substring(0, 15)}...</span>
                        <span class="text-[10px] text-gray-700">${date}</span>
                    </div>
                `;
                userListEl.appendChild(div);
            });
        }

        async function loadChat(roomId, name) {
            // UI Transition
            emptyStateEl.classList.add('hidden');
            chatHeaderEl.classList.remove('hidden');
            chatHistoryEl.classList.remove('hidden');
            chatHistoryEl.innerHTML = '<div class="h-full flex items-center justify-center text-gray-600">Retrieving encrypted logs...</div>';
            
            activeUsernameEl.textContent = name;
            activeRoomIdEl.textContent = `Room: ${roomId}`;
            activeAvatarEl.textContent = name.charAt(0);

            // Fetch messages
            const { data, error } = await supabase
                .from('chat_messages')
                .select('*')
                .eq('room_id', roomId)
                .order('created_at', { ascending: true });

            if (error) {
                chatHistoryEl.innerHTML = `<div class="p-6 text-rose-500">Error loading chat: ${error.message}</div>`;
                return;
            }

            msgCountEl.textContent = `${data.length} messages`;
            renderMessages(data);
        }

        function renderMessages(messages) {
            chatHistoryEl.innerHTML = '';
            messages.forEach(msg => {
                const isAI = msg.nickname === 'AI_BOT';
                const wrapper = document.createElement('div');
                wrapper.className = `flex flex-col ${isAI ? 'items-start' : 'items-end'}`;
                
                const time = new Date(msg.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
                const date = new Date(msg.created_at).toLocaleDateString();

                wrapper.innerHTML = `
                    <div class="flex items-center gap-2 mb-1 px-1">
                        <span class="text-[10px] font-bold tracking-widest uppercase ${isAI ? 'text-rose-500' : 'text-blue-400'}">${msg.nickname}</span>
                        <span class="text-[9px] text-gray-600">${date} ${time}</span>
                    </div>
                    <div class="max-w-[80%] p-4 rounded-2xl ${isAI ? 'chat-bubble-ai rounded-tl-none' : 'chat-bubble-user rounded-tr-none text-white'} shadow-xl">
                        <p class="text-[15px] leading-relaxed whitespace-pre-wrap">${msg.content}</p>
                    </div>
                `;
                chatHistoryEl.appendChild(wrapper);
            });
            chatHistoryEl.scrollTop = chatHistoryEl.scrollHeight;
        }

        refreshBtn.onclick = fetchUsers;
        
        // Initial Load
        fetchUsers();
    </script>
</body>
</html>
